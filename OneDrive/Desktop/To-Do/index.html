<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>To-Do Application</title>
    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <!-- CSS link -->
    <link rel="stylesheet" href="css/style.css">
</head>

<body class="bg-light">

    <header>
        <div class="container-fluid mt-5 mb-5 text-center">
            <div class="To bg-secondary bg-gradient text-white">
        <h1>To Do Application</h1>
        </div>
</div>
    </header>
    <section>
        <div class="container mt-5 mb-5">
            <div class="row justify-content-center">
                <div class="col-md-8 col-lg-6">
                    <div class="card shadow bg-secondary-subtle">
                        <div class="card-header bg-dark bg-gradient text-white">
                            <h2 class="text-center mb-4">My To-Do List</h2>
                        </div>
                        <div class="card-body">
                            <div class="input-group mb-4">
                                <input id="taskInput" type="text" class="form-control" placeholder="enter a task">
                                <button class="btn btn-success" onclick="addTask()">Add</button>
                            </div>
                            <div id="tasks-container">

                            </div>


                        </div>
                        <div class="text-center text-muted d-none" id="message">
                            <p>No tasks added yet</p>
                        </div>
                    </div>
                </div>

            </div>

        </div>
    </section>
    <footer>
        <p class="text-center mt-6 sm">MyTodo Application</p>
    </footer>


    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
    <script src="/js/script.js"></script>
</body>

</html>
